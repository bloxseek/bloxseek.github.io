<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BloxSeek Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            height: 100vh;
        }
        header {
            text-align: center;
            padding: 20px;
        }
        h1 {
            margin: 0;
        }
        .chat-container {
            background-color: rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            overflow: hidden;
        }
        .messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .message {
            margin: 5px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
        }
        .user {
            background-color: #ffcc00;
            color: #000;
            align-self: flex-end;
        }
        .bot {
            background-color: rgba(255,255,255,0.2);
            align-self: flex-start;
        }
        .input-container {
            display: flex;
            border-top: 1px solid #fff;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: none;
            font-size: 1em;
            border-radius: 0;
        }
        button {
            padding: 10px 20px;
            border: none;
            background-color: #ffcc00;
            color: #000;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>BloxSeek Chat</h1>
        <p>Общайся с нейросетью прямо на сайте!</p>
    </header>

    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="input-container">
            <input type="text" id="chatInput" placeholder="Напиши сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const messagesDiv = document.getElementById('messages');
            const text = input.value.trim();
            if(!text) return;

            // Сообщение пользователя
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.textContent = text;
            messagesDiv.appendChild(userMsg);

            // Прокрутка вниз
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            input.value = '';

            // Ответ "нейросети" (пока простая имитация)
            setTimeout(() => {
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                botMsg.textContent = `Бот говорит: я получил твое сообщение "${text}"`;
                messagesDiv.appendChild(botMsg);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, 500);
        }
    </script>
</body>
</html>
