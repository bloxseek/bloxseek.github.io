<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BloxSeek Chat</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #1e1e1e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .chat-box {
        width: 300px;
        height: 400px;
        background: #2c2c2c;
        display: flex;
        flex-direction: column;
        border-radius: 8px;
        overflow: hidden;
    }
    .messages {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
        color: #fff;
        font-size: 14px;
    }
    .message {
        margin: 5px 0;
        padding: 5px 8px;
        border-radius: 5px;
        max-width: 80%;
        word-wrap: break-word;
    }
    .user {
        background: #ffcc00;
        color: #000;
        align-self: flex-end;
    }
    .bot {
        background: #555;
        align-self: flex-start;
    }
    .input-container {
        display: flex;
        border-top: 1px solid #444;
    }
    input[type="text"] {
        flex: 1;
        border: none;
        padding: 8px;
        font-size: 14px;
        background: #333;
        color: #fff;
    }
    input[type="text"]:focus {
        outline: none;
    }
    button {
        border: none;
        background: #ffcc00;
        color: #000;
        padding: 0 12px;
        cursor: pointer;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="chat-box">
    <div class="messages" id="messages"></div>
    <div class="input-container">
        <input type="text" id="chatInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">▶</button>
    </div>
</div>

<script>
function sendMessage() {
    const input = document.getElementById('chatInput');
    const messages = document.getElementById('messages');
    const text = input.value.trim();
    if (!text) return;

    // Добавляем сообщение пользователя
    const userMsg = document.createElement('div');
    userMsg.className = 'message user';
    userMsg.textContent = text;
    messages.appendChild(userMsg);

    input.value = '';
    messages.scrollTop = messages.scrollHeight;

    // Ответ бота (имитация)
    setTimeout(() => {
        const botMsg = document.createElement('div');
        botMsg.className = 'message bot';
        botMsg.textContent = `Бот: получил "${text}"`;
        messages.appendChild(botMsg);
        messages.scrollTop = messages.scrollHeight;
    }, 300);
}
</script>

</body>
</html>
