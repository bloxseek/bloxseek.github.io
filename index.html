<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxSeek - Нейросеть</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; }
        .chat-container { max-width: 600px; margin: 0 auto; padding: 20px; }
        #messages { height: 400px; overflow-y: auto; border: 1px solid #333; padding: 10px; }
        .user-message { color: #00ff00; }
        .bot-message { color: #00ffff; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>🧠 BloxSeek</h1>
        <div id="messages"></div>
        <input type="text" id="userInput" placeholder="Напиши сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        // 👇 ТВОЙ КЛЮЧ СЮДА!!!
        const API_KEY = "AIzaSyC9gg7tyt-KNMd-EXzQqSVnDVzAIQaytYM;
        
        async function sendMessage() {
            const userInput = document.getElementById('userInput');
            const message = userInput.value;
            if (!message) return;
            
            // Показываем сообщение пользователя
            addMessage(message, 'user');
            userInput.value = '';
            
            // Показываем "печатает..."
            const typingId = addTypingIndicator();
            
            try {
                // Отправляем запрос к Gemini
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + API_KEY, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: message
                            }]
                        }]
                    })
                });
                
                const data = await response.json();
                // Убираем "печатает..."
                removeTypingIndicator(typingId);
                
                // Получаем ответ
                const reply = data.candidates[0].content.parts[0].text;
                addMessage(reply, 'bot');
                
            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage('Ошибка: ' + error, 'bot');
            }
        }
        
        function addMessage(text, sender) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = sender + '-message';
            div.textContent = (sender === 'user' ? '👤: ' : '🤖: ') + text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function addTypingIndicator() {
            const messages = document.getElementById('messages');
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.textContent = '🤖 печатает...';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return id;
        }
        
        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
        
        // Enter отправляет
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>ц
