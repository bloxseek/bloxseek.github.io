<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BloxSeek</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: rgba(0,0,0,0.5);
            padding: 20px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 3em;
            letter-spacing: 2px;
        }
        .search-container {
            text-align: center;
            margin: 50px 0;
        }
        input[type="text"] {
            padding: 10px;
            width: 300px;
            font-size: 1em;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background-color: #ffcc00;
            color: #000;
            cursor: pointer;
            margin-left: 10px;
        }
        .results {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .result-item {
            background-color: rgba(255,255,255,0.1);
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>BloxSeek</h1>
        <p>Ищи мемы, аватары и картинки через AI!</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Введите слово для поиска...">
        <button onclick="search()">Искать</button>
    </div>

    <div class="results" id="results"></div>

    <script>
        function search() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if(query.trim() === '') return;

            // Пример "симуляции" поиска (пока без реального AI)
            for(let i=1; i<=5; i++){
                const div = document.createElement('div');
                div.className = 'result-item';
                div.textContent = `Результат ${i} для "${query}"`;
                resultsDiv.appendChild(div);
            }
        }
    </script>
</body>
</html>
